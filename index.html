<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genz Talk - Group</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0b141a; color: #e9edef; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Login Overlay */
        #login-screen { position: fixed; inset: 0; background: #0b141a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .login-box { background: #202c33; padding: 30px; border-radius: 15px; width: 100%; max-width: 350px; text-align: center; }
        
        /* Main App */
        .app { width: 100%; max-width: 450px; height: 95vh; background: #0b141a; display: flex; flex-direction: column; border-radius: 10px; border: 1px solid #222e35; }
        .header { background: #202c33; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 12px; color: #00a884; font-weight: bold; }

        #chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        
        .msg { padding: 8px 14px; border-radius: 8px; max-width: 80%; font-size: 15px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .sent { background: #005c4b; align-self: flex-end; border-top-right-radius: 0; }
        .received { background: #202c33; align-self: flex-start; border-top-left-radius: 0; }
        
        .user-label { font-size: 11px; font-weight: bold; margin-bottom: 4px; display: block; color: #34b7f1; }
        .time { font-size: 10px; color: #8696a0; text-align: right; margin-top: 5px; }

        .input-bar { background: #202c33; padding: 12px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: #2a3942; color: white; outline: none; }
        button { background: #00a884; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="margin-bottom: 20px;">Genz Talk</h2>
        <input type="text" id="usernameInput" placeholder="Enter your name..." style="width: 100%; margin-bottom: 15px;">
        <button onclick="joinChat()" style="width: 100%; border-radius: 8px;">Join Chat</button>
    </div>
</div>

<div class="app">
    <div class="header">
        <strong>Genz Group</strong>
        <div class="status" id="connStatus">Connecting...</div>
    </div>
    <div id="chat"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="Type a message...">
        <button onclick="sendMsg()">➤</button>
    </div>
</div>

<script>
    const ABLY_KEY = '-AH-2A.nFhslQ:tmnJR6FrDPv2cg53XRnEinFRH8vELv0IksQpIeZzrlg'; 
    const ROOM_NAME = 'genz-private-room-v1'; 

    let myUsername = "Guest";
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get(ROOM_NAME);
    const myId = 'user-' + Math.floor(Math.random() * 10000);

    function joinChat() {
        const input = document.getElementById('usernameInput');
        if (input.value.trim() !== "") {
            myUsername = input.value.trim();
            document.getElementById('login-screen').style.display = 'none';
        }
    }

    ably.connection.on('connected', () => {
        document.getElementById('connStatus').innerText = "Online";
    });

    channel.subscribe('chat-msg', (msg) => {
        const isMe = msg.data.senderId === myId;
        renderMessage(msg.data.text, isMe ? 'sent' : 'received', msg.data.timestamp, msg.data.user);
    });

    function sendMsg() {
        const input = document.getElementById('msgInput');
        if (input.value.trim() === "") return;

        const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        channel.publish('chat-msg', {
            text: input.value,
            senderId: myId,
            user: myUsername,
            timestamp: timestamp
        });
        input.value = "";
    }

    function renderMessage(text, type, time, user) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        
        // Don't show username on your own messages to look like WhatsApp
        const userLabel = type === 'received' ? `<span class="user-label">${user}</span>` : '';
        
        div.innerHTML = `${userLabel}${text} <div class="time">${time}</div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('msgInput').addEventListener("keypress", (e) => { if (e.key === "Enter") sendMsg(); });
    document.getElementById('usernameInput').addEventListener("keypress", (e) => { if (e.key === "Enter") joinChat(); });
</script>

</body>
</html>
